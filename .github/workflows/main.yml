name: Sync Releases and Tags
on:
  workflow_dispatch: # تشغيل يدوي بضغطة زر

permissions:
  contents: write # تفعيل صلاحية رفع الملفات لمستودعك

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Releases using GitHub CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "جاري الاتصال بمستودع deepinsight/insightface..."
          
          # 1. جلب قائمة كل الـ Releases من المشروع الأصلي عبر الـ API الرسمي
          releases=$(gh api repos/deepinsight/insightface/releases --jq '.[] | .tag_name')

          # 2. حلقة تكرارية لنسخ الملفات لكل وسم
          for tag in $releases; do
            echo "------------------------------------------------"
            echo "جاري معالجة ونسخ الوسم: $tag"
            
            # إنشاء مجلد مؤقت نظيف لكل وسم
            mkdir -p ./downloads
            
            # تحميل ملفات الـ Assets الخاصة بالوسم من المستودع الأصلي
            gh release download $tag -R deepinsight/insightface -D ./downloads --pattern "*" || true
            
            # إنشاء الـ Release داخل مستودعك ورفع الملفات إليه مباشرة
            if [ "$(ls -A ./downloads)" ]; then
              echo "جاري رفع الملفات المرفقة للوسم $tag إلى مستودعك الخاص..."
              gh release create $tag ./downloads/* -t "$tag" -n "نسخة احتياطية آمنة للموديلات والملفات الخاصة بالوسم $tag" --repo ${{ github.repository }} || true
            else
              echo "الوسم $tag لا يحتوي على ملفات مرفقة، يتم إنشائه كـ Tag فقط..."
              gh release create $tag -t "$tag" -n "نسخة احتياطية آمنة للوسم $tag" --repo ${{ github.repository }} || true
            fi
            
            # مسح المجلد المؤقت للانتقال للوسم التالي
            rm -rf ./downloads
          done
          echo "تمت عملية النسخ والحفظ بنجاح تام! ✔️"
