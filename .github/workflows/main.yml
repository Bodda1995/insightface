name: Sync Releases and Tags
on:
  workflow_dispatch: # يتيح لك تشغيل الأداة يدوياً بضغطة زر

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Copy Releases From Upstream
        uses: aeon-php/github-release-copy-action@v1
        with:
          source_repository: 'https://github.com/deepinsight/insightface/releases'
          target_repository: '${{ github.repository }}'
          github_token: ${{ secrets.GITHUB_TOKEN }}
